name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check app tests

      - name: Run tests with coverage
        env:
          # CostGuard + services read these at import time; tests mock but a
          # sane default avoids surprises.
          GCP_PROJECT_ID: ci-test-project
          GEMINI_API_KEY: dummy
        run: |
          pytest \
            --cov=app \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-report=html \
            --junitxml=junit.xml

      - name: Coverage threshold (soft 70%)
        if: always()
        run: |
          python -c "
          import xml.etree.ElementTree as ET, sys
          root = ET.parse('coverage.xml').getroot()
          pct = float(root.attrib.get('line-rate', 0)) * 100
          print(f'Backend coverage: {pct:.1f}%')
          if pct < 70:
              print(f'::warning title=Backend coverage below 70%::{pct:.1f}% < 70% target')
          "

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: |
            backend/htmlcov/
            backend/coverage.xml
            backend/junit.xml

  frontend:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc -b --noEmit

      - name: Run tests with coverage
        run: npm test -- --coverage --reporter=default --reporter=junit --outputFile=junit.xml

      - name: Coverage threshold (soft 60%)
        if: always()
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            node -e "
              const s = require('./coverage/coverage-summary.json').total;
              const pct = s.lines.pct;
              console.log('Frontend line coverage:', pct + '%');
              if (pct < 60) {
                console.log('::warning title=Frontend coverage below 60%::' + pct + '% < 60% target');
              }
            "
          else
            echo "::warning title=Coverage summary missing::coverage/coverage-summary.json not produced"
          fi

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: |
            frontend/coverage/
            frontend/junit.xml

  rules:
    name: Firestore rules
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tests/rules/package.json

      - name: Set up Java (for firebase-tools emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install rules-test dependencies
        working-directory: tests/rules
        run: npm install

      - name: Run rules tests against emulator
        # `emulators:exec` starts Firestore, runs the command, shuts down.
        # Run from repo root so firebase.json resolves naturally.
        run: >-
          firebase emulators:exec
          --only firestore
          --project ignyt-rules-test
          "cd tests/rules && npm test"

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    # Only run on PRs to save CI time on every push; scheduled runs catch drift.
    if: github.event_name == 'pull_request'
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright E2E (smoke)
        # Smoke only — the deeper flows require Firebase + backend and are
        # covered by RTL unit tests and rules-unit-testing. See
        # frontend/tests/e2e/README.md for the expanded-scope recipe.
        run: npm run test:e2e
        env:
          # Dummy values so the Firebase SDK doesn't throw at init — the
          # smoke suite never completes sign-in, so real creds aren't needed.
          VITE_FIREBASE_API_KEY: ci-dummy
          VITE_FIREBASE_AUTH_DOMAIN: ci.example.com
          VITE_FIREBASE_PROJECT_ID: ci-dummy
          VITE_FIREBASE_STORAGE_BUCKET: ci-dummy.appspot.com
          VITE_FIREBASE_MESSAGING_SENDER_ID: "0"
          VITE_FIREBASE_APP_ID: "0:0:web:0"
          VITE_API_URL: http://localhost:8080/api

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report/

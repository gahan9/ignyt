# Pre-commit hooks for the Ignyt repo.
#
# Install once per clone:
#   pip install pre-commit
#   pre-commit install
#
# Run manually against the whole repo:
#   pre-commit run --all-files
#
# CI mirrors these checks (see .github/workflows/ci.yml) so a clean
# pre-commit run is the local proof that your push will go green.

repos:
  # --- Generic hygiene ---------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: detect-private-key

  # --- Python: ruff lint + format (replaces flake8/isort/black/pydocstyle) ---
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.6.9
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        files: ^backend/
      - id: ruff-format
        files: ^backend/

  # --- Python: static type checking ------------------------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.11.2
    hooks:
      - id: mypy
        files: ^backend/app/
        args: ["--config-file=backend/pyproject.toml"]
        additional_dependencies:
          - "pydantic>=2.0"
          - "pydantic-settings"
          - "fastapi"
          - "structlog"

  # --- Python: security linting (SAST) ---------------------------------------
  - repo: https://github.com/PyCQA/bandit
    rev: "1.7.10"
    hooks:
      - id: bandit
        files: ^backend/app/
        args: ["-c", "backend/pyproject.toml", "-q"]
        additional_dependencies: ["bandit[toml]"]

  # --- Secrets: catch tokens/keys before they hit history --------------------
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks
